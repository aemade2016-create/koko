<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار تحميل المنتجات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="bg-gray-50 p-8">
    <div class="max-w-4xl mx-auto">
        <div class="bg-white rounded-2xl shadow-xl p-8 mb-6">
            <h1 class="text-3xl font-bold mb-6 text-center">🧪 اختبار تحميل المنتجات</h1>

            <div class="space-y-4">
                <button onclick="testLoadProducts()"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-lg font-bold text-lg transition">
                    <i class="fas fa-play mr-2"></i>
                    اختبار تحميل المنتجات
                </button>

                <button onclick="checkLocalStorage()"
                    class="w-full bg-green-600 hover:bg-green-700 text-white py-4 rounded-lg font-bold text-lg transition">
                    <i class="fas fa-database mr-2"></i>
                    فحص localStorage
                </button>

                <button onclick="loadFromFile()"
                    class="w-full bg-purple-600 hover:bg-purple-700 text-white py-4 rounded-lg font-bold text-lg transition">
                    <i class="fas fa-file-import mr-2"></i>
                    تحميل من الملف مباشرة
                </button>

                <button onclick="clearAndReload()"
                    class="w-full bg-red-600 hover:bg-red-700 text-white py-4 rounded-lg font-bold text-lg transition">
                    <i class="fas fa-trash mr-2"></i>
                    مسح localStorage وإعادة التحميل
                </button>

                <a href="./shop.html"
                    class="block w-full bg-pink-600 hover:bg-pink-700 text-white py-4 rounded-lg font-bold text-lg text-center transition">
                    <i class="fas fa-store mr-2"></i>
                    فتح صفحة المتجر
                </a>
            </div>
        </div>

        <div id="results" class="bg-white rounded-2xl shadow-xl p-8">
            <h2 class="text-2xl font-bold mb-4">النتائج:</h2>
            <div id="output" class="bg-gray-50 p-4 rounded-lg font-mono text-sm overflow-auto max-h-96">
                اضغط على أي زر لبدء الاختبار...
            </div>
        </div>
    </div>

    <!-- Load Scripts -->
    <script src="./js/core/state.js"></script>
    <script src="./js/services/product.service.js"></script>

    <script>
        function log(message, type = 'info') {
            const output = document.getElementById('output');
            const colors = {
                info: 'text-blue-600',
                success: 'text-green-600',
                error: 'text-red-600',
                warning: 'text-yellow-600'
            };
            const icons = {
                info: 'ℹ️',
                success: '✅',
                error: '❌',
                warning: '⚠️'
            };

            const line = document.createElement('div');
            line.className = `mb-2 ${colors[type]}`;
            line.textContent = `${icons[type]} ${message}`;
            output.appendChild(line);
            output.scrollTop = output.scrollHeight;
        }

        function clearOutput() {
            document.getElementById('output').innerHTML = '';
        }

        async function testLoadProducts() {
            clearOutput();
            log('🔄 بدء اختبار تحميل المنتجات...', 'info');

            try {
                const products = await getAllProducts();
                log(`✅ تم تحميل ${products.length} منتج بنجاح!`, 'success');

                products.forEach((p, i) => {
                    log(`${i + 1}. ${p.title.ar} - ${p.price} جنيه`, 'info');
                });

                log('✅ الاختبار نجح!', 'success');
            } catch (error) {
                log(`❌ فشل الاختبار: ${error.message}`, 'error');
                console.error(error);
            }
        }

        function checkLocalStorage() {
            clearOutput();
            log('🔍 فحص localStorage...', 'info');

            const stored = localStorage.getItem('products');
            if (stored) {
                try {
                    const products = JSON.parse(stored);
                    log(`✅ وجدت ${products.length} منتج في localStorage`, 'success');

                    products.forEach((p, i) => {
                        log(`${i + 1}. ${p.title.ar} - ${p.price} جنيه`, 'info');
                    });
                } catch (error) {
                    log(`❌ خطأ في قراءة البيانات: ${error.message}`, 'error');
                    log('⚠️ البيانات تالفة! استخدم زر "مسح localStorage"', 'warning');
                }
            } else {
                log('⚠️ لا توجد منتجات في localStorage', 'warning');
                log('💡 سيتم تحميلها من الملف عند فتح الموقع', 'info');
            }
        }

        async function loadFromFile() {
            clearOutput();
            log('📥 تحميل المنتجات من الملف...', 'info');

            try {
                const response = await fetch('./js/data/products.json');
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const products = await response.json();
                log(`✅ تم تحميل ${products.length} منتج من الملف`, 'success');

                // Save to localStorage
                localStorage.setItem('products', JSON.stringify(products));
                log('✅ تم حفظ المنتجات في localStorage', 'success');

                products.forEach((p, i) => {
                    log(`${i + 1}. ${p.title.ar} - ${p.price} جنيه`, 'info');
                });

            } catch (error) {
                log(`❌ فشل التحميل: ${error.message}`, 'error');
                log('⚠️ تأكد من وجود الملف: js/data/products.json', 'warning');
                console.error(error);
            }
        }

        function clearAndReload() {
            if (confirm('هل أنت متأكد من مسح جميع البيانات؟')) {
                localStorage.clear();
                log('✅ تم مسح localStorage', 'success');
                log('🔄 إعادة تحميل الصفحة...', 'info');
                setTimeout(() => location.reload(), 1000);
            }
        }

        // Auto-check on load
        window.addEventListener('DOMContentLoaded', () => {
            log('🚀 الصفحة جاهزة للاختبار', 'success');
            log('💡 اضغط على أي زر لبدء الاختبار', 'info');
        });
    </script>
</body>

</html>
