<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Theme Toggle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen p-8">

    <div class="max-w-2xl mx-auto">
        <h1 class="text-4xl font-bold mb-8">Theme Toggle Test</h1>

        <div class="bg-white dark:bg-gray-800 p-8 rounded-lg shadow-lg mb-8">
            <h2 class="text-2xl font-bold mb-4">Current Theme</h2>
            <p class="mb-4">Theme: <span id="current-theme" class="font-bold text-pink-600">Loading...</span></p>

            <button onclick="testToggleTheme()"
                class="bg-pink-600 hover:bg-pink-700 text-white px-6 py-3 rounded-lg font-semibold transition">
                <i id="theme-icon" class="fas fa-moon mr-2"></i>
                <span id="theme-text">Toggle Theme</span>
            </button>
        </div>

        <div class="bg-white dark:bg-gray-800 p-8 rounded-lg shadow-lg">
            <h2 class="text-2xl font-bold mb-4">Test Elements</h2>

            <div class="space-y-4">
                <div class="p-4 bg-gray-50 dark:bg-gray-700 rounded">
                    <p>Background changes with theme</p>
                </div>

                <input type="text" placeholder="Input field"
                    class="w-full px-4 py-2 border rounded dark:bg-gray-700 dark:border-gray-600">

                <button class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded">
                    Button
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="./js/core/state.js"></script>
    <script src="./js/core/i18n.js"></script>
    <script src="./js/core/theme.js"></script>

    <script>
        // Test function
        function testToggleTheme() {
            console.log('Button clicked!');
            console.log('Current theme before:', AppState.ui.theme);

            if (typeof toggleTheme === 'function') {
                toggleTheme();
                console.log('Current theme after:', AppState.ui.theme);
                updateDisplay();
            } else {
                console.error('toggleTheme is not defined!');
                alert('Error: toggleTheme function not found!');
            }
        }

        function updateDisplay() {
            const currentTheme = AppState.ui.theme;
            document.getElementById('current-theme').textContent = currentTheme;

            const icon = document.getElementById('theme-icon');
            const text = document.getElementById('theme-text');

            if (currentTheme === 'dark') {
                icon.className = 'fas fa-sun mr-2';
                text.textContent = 'Switch to Light Mode';
            } else {
                icon.className = 'fas fa-moon mr-2';
                text.textContent = 'Switch to Dark Mode';
            }
        }

        // Initialize display
        window.addEventListener('DOMContentLoaded', () => {
            console.log('Page loaded');
            console.log('AppState:', AppState);
            console.log('toggleTheme function:', typeof toggleTheme);
            updateDisplay();
        });
    </script>
</body>

</html>
