<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إعادة تعيين المنتجات</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-xl p-8 max-w-md w-full text-center">
        <div class="mb-6">
            <i class="fas fa-sync-alt text-6xl text-pink-600 mb-4"></i>
            <h1 class="text-3xl font-bold mb-2">إعادة تعيين المنتجات</h1>
            <p class="text-gray-600">اضغط على الزر لإعادة تحميل المنتجات من الملف الأصلي</p>
        </div>

        <button onclick="resetProducts()"
            class="w-full bg-pink-600 hover:bg-pink-700 text-white py-4 rounded-lg font-bold text-lg mb-4 transition">
            إعادة تعيين المنتجات
        </button>

        <button onclick="clearAll()"
            class="w-full bg-red-600 hover:bg-red-700 text-white py-4 rounded-lg font-bold text-lg mb-4 transition">
            مسح جميع البيانات
        </button>

        <a href="./index.html"
            class="block w-full bg-gray-200 hover:bg-gray-300 text-gray-800 py-4 rounded-lg font-bold text-lg transition">
            العودة للصفحة الرئيسية
        </a>

        <div id="status" class="mt-6 p-4 rounded-lg hidden"></div>
    </div>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <script>
        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.className = `mt-6 p-4 rounded-lg ${type === 'success' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}`;
            status.textContent = message;
            status.classList.remove('hidden');
        }

        async function resetProducts() {
            try {
                // حذف المنتجات القديمة من localStorage
                localStorage.removeItem('products');

                // تحميل المنتجات من الملف
                const response = await fetch('./js/data/products.json');
                if (!response.ok) {
                    throw new Error('فشل تحميل الملف');
                }

                const products = await response.json();

                // حفظ المنتجات في localStorage
                localStorage.setItem('products', JSON.stringify(products));

                showStatus(`✅ تم إعادة تحميل ${products.length} منتج بنجاح!`, 'success');

                // إعادة التحميل بعد ثانيتين
                setTimeout(() => {
                    window.location.href = './index.html';
                }, 2000);

            } catch (error) {
                console.error('خطأ:', error);
                showStatus('❌ حدث خطأ أثناء إعادة التحميل: ' + error.message, 'error');
            }
        }

        function clearAll() {
            if (confirm('هل أنت متأكد من مسح جميع البيانات؟\n\nسيتم مسح:\n- المنتجات\n- السلة\n- المفضلة\n- الحسابات\n- الطلبات\n- جميع الإعدادات')) {
                localStorage.clear();
                showStatus('✅ تم مسح جميع البيانات بنجاح!', 'success');

                setTimeout(() => {
                    window.location.href = './index.html';
                }, 2000);
            }
        }

        // عرض عدد المنتجات الحالية
        window.addEventListener('DOMContentLoaded', () => {
            const stored = localStorage.getItem('products');
            if (stored) {
                try {
                    const products = JSON.parse(stored);
                    const status = document.getElementById('status');
                    status.className = 'mt-6 p-4 rounded-lg bg-blue-100 text-blue-800';
                    status.textContent = `📦 عدد المنتجات الحالية: ${products.length}`;
                    status.classList.remove('hidden');
                } catch (e) {
                    console.error('خطأ في قراءة المنتجات:', e);
                }
            } else {
                const status = document.getElementById('status');
                status.className = 'mt-6 p-4 rounded-lg bg-yellow-100 text-yellow-800';
                status.textContent = '⚠️ لا توجد منتجات في localStorage';
                status.classList.remove('hidden');
            }
        });
    </script>
</body>

</html>
