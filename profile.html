<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Glow Beauty</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Firebase SDK v9+ (Modular) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics-compat.js"></script>
</head>

<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100">

    <div id="header-component"></div>

    <main class="py-16 px-4">
        <div class="container mx-auto max-w-4xl">
            <div class="flex items-center justify-between mb-8">
                <h1 class="text-4xl font-bold">My Profile</h1>
                <a href="./dashboard.html" class="text-pink-600 hover:text-pink-700 font-semibold">
                    <i class="fas fa-arrow-left mr-2"></i>Back to Dashboard
                </a>
            </div>

            <div class="grid lg:grid-cols-3 gap-8">
                <!-- Profile Picture Section -->
                <div class="lg:col-span-1">
                    <div class="bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-lg text-center">
                        <div class="relative inline-block mb-4">
                            <img id="profile-picture" src="https://via.placeholder.com/150" alt="Profile Picture"
                                class="w-32 h-32 rounded-full object-cover border-4 border-pink-600">
                            <button onclick="document.getElementById('profile-picture-input').click()"
                                class="absolute bottom-0 right-0 bg-pink-600 text-white rounded-full w-10 h-10 flex items-center justify-center hover:bg-pink-700 transition">
                                <i class="fas fa-camera"></i>
                            </button>
                            <input type="file" id="profile-picture-input" accept="image/*" class="hidden"
                                onchange="handleProfilePictureChange(event)">
                        </div>
                        <h3 id="profile-name-display" class="text-xl font-bold mb-2">Loading...</h3>
                        <p id="profile-email-display" class="text-gray-500 mb-4">Loading...</p>
                        <div class="flex items-center justify-center gap-2 text-yellow-500">
                            <i class="fas fa-star"></i>
                            <span id="profile-points-display">0</span>
                            <span class="text-gray-500">Points</span>
                        </div>
                    </div>
                </div>

                <!-- Profile Information Form -->
                <div class="lg:col-span-2">
                    <div class="bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-lg">
                        <h2 class="text-2xl font-bold mb-6">Personal Information</h2>

                        <form id="profile-form" class="space-y-6">
                            <!-- Full Name -->
                            <div>
                                <label class="block text-sm font-medium mb-2">
                                    <i class="fas fa-user mr-2 text-pink-600"></i>Full Name *
                                </label>
                                <input type="text" id="full-name" required placeholder="Enter your full name"
                                    class="w-full px-4 py-3 border rounded-lg dark:bg-gray-700 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-pink-500">
                            </div>

                            <!-- Email (Read-only) -->
                            <div>
                                <label class="block text-sm font-medium mb-2">
                                    <i class="fas fa-envelope mr-2 text-pink-600"></i>Email
                                </label>
                                <input type="email" id="email" readonly
                                    class="w-full px-4 py-3 border rounded-lg bg-gray-100 dark:bg-gray-600 dark:border-gray-600 cursor-not-allowed">
                            </div>

                            <!-- Phone Number -->
                            <div>
                                <label class="block text-sm font-medium mb-2">
                                    <i class="fas fa-phone mr-2 text-pink-600"></i>Phone Number *
                                </label>
                                <input type="tel" id="phone-number" required placeholder="+20 123 456 7890"
                                    class="w-full px-4 py-3 border rounded-lg dark:bg-gray-700 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-pink-500">
                            </div>

                            <!-- Address -->
                            <div>
                                <label class="block text-sm font-medium mb-2">
                                    <i class="fas fa-map-marker-alt mr-2 text-pink-600"></i>Address *
                                </label>
                                <textarea id="address" required rows="3" placeholder="Enter your full address"
                                    class="w-full px-4 py-3 border rounded-lg dark:bg-gray-700 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-pink-500"></textarea>
                            </div>

                            <!-- City & Postal Code -->
                            <div class="grid md:grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-sm font-medium mb-2">
                                        <i class="fas fa-city mr-2 text-pink-600"></i>City
                                    </label>
                                    <input type="text" id="city" placeholder="Cairo"
                                        class="w-full px-4 py-3 border rounded-lg dark:bg-gray-700 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-pink-500">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium mb-2">
                                        <i class="fas fa-mail-bulk mr-2 text-pink-600"></i>Postal Code
                                    </label>
                                    <input type="text" id="postal-code" placeholder="12345"
                                        class="w-full px-4 py-3 border rounded-lg dark:bg-gray-700 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-pink-500">
                                </div>
                            </div>

                            <!-- Save Button -->
                            <div class="flex gap-4">
                                <button type="submit"
                                    class="flex-1 bg-pink-600 hover:bg-pink-700 text-white py-3 rounded-lg font-semibold transition">
                                    <i class="fas fa-save mr-2"></i>Save Changes
                                </button>
                                <button type="button" onclick="loadUserProfile()"
                                    class="px-6 border-2 border-gray-300 dark:border-gray-600 py-3 rounded-lg font-semibold hover:bg-gray-50 dark:hover:bg-gray-700 transition">
                                    <i class="fas fa-undo mr-2"></i>Reset
                                </button>
                            </div>
                        </form>
                    </div>

                    <!-- Account Settings -->
                    <div class="bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-lg mt-6">
                        <h2 class="text-2xl font-bold mb-6">Account Settings</h2>

                        <div class="space-y-4">
                            <button onclick="changePassword()"
                                class="w-full flex items-center justify-between p-4 border dark:border-gray-700 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 transition">
                                <div class="flex items-center gap-3">
                                    <i class="fas fa-key text-pink-600 text-xl"></i>
                                    <span class="font-semibold">Change Password</span>
                                </div>
                                <i class="fas fa-chevron-right text-gray-400"></i>
                            </button>

                            <button onclick="deleteAccount()"
                                class="w-full flex items-center justify-between p-4 border border-red-300 dark:border-red-700 rounded-lg hover:bg-red-50 dark:hover:bg-red-900/20 transition text-red-600">
                                <div class="flex items-center gap-3">
                                    <i class="fas fa-trash text-xl"></i>
                                    <span class="font-semibold">Delete Account</span>
                                </div>
                                <i class="fas fa-chevron-right"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-component"></div>

    <!-- Load Firebase Config First -->
    <script src="./js/core/firebase-config.js"></script>

    <!-- Load other scripts -->
    <script src="./js/core/state.js"></script>
    <script src="./js/core/i18n.js"></script>
    <script src="./js/core/theme.js"></script>
    <script src="./js/core/router.js"></script>
    <script src="./js/services/product.service.js"></script>
    <script src="./js/services/cart.service.js"></script>
    <script src="./js/services/auth.service.js"></script>
    <script src="./js/components/header.component.js"></script>
    <script src="./js/components/footer.component.js"></script>
    <script src="./js/components/product-card.component.js"></script>
    <script src="./js/app.js"></script>

    <!-- Load Profile Page Logic -->
    <script src="./js/pages/profile.page.js"></script>
</body>

</html>
