<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Glow Beauty</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100">

    <div id="header-component"></div>

    <main class="py-16 px-4">
        <div class="container mx-auto max-w-6xl">
            <h1 class="text-5xl font-bold text-center mb-4">Contact Us</h1>
            <p class="text-center text-gray-600 dark:text-gray-400 mb-12">We'd love to hear from you!</p>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
                <!-- Contact Form -->
                <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-lg p-8">
                    <h2 class="text-2xl font-bold mb-6">Send us a message</h2>
                    <form onsubmit="handleContactForm(event)" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium mb-2">Name</label>
                            <input type="text" required
                                class="w-full px-4 py-3 border rounded-lg dark:bg-gray-700 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-pink-500">
                        </div>

                        <div>
                            <label class="block text-sm font-medium mb-2">Email</label>
                            <input type="email" required
                                class="w-full px-4 py-3 border rounded-lg dark:bg-gray-700 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-pink-500">
                        </div>

                        <div>
                            <label class="block text-sm font-medium mb-2">Phone</label>
                            <input type="tel"
                                class="w-full px-4 py-3 border rounded-lg dark:bg-gray-700 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-pink-500">
                        </div>

                        <div>
                            <label class="block text-sm font-medium mb-2">Subject</label>
                            <input type="text" required
                                class="w-full px-4 py-3 border rounded-lg dark:bg-gray-700 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-pink-500">
                        </div>

                        <div>
                            <label class="block text-sm font-medium mb-2">Message</label>
                            <textarea required rows="5"
                                class="w-full px-4 py-3 border rounded-lg dark:bg-gray-700 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-pink-500"></textarea>
                        </div>

                        <button type="submit"
                            class="w-full bg-pink-600 hover:bg-pink-700 text-white py-3 rounded-lg font-semibold transition">
                            Send Message
                        </button>
                    </form>
                </div>

                <!-- Contact Info -->
                <div class="space-y-8">
                    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-lg p-8">
                        <h2 class="text-2xl font-bold mb-6">Get in Touch</h2>

                        <div class="space-y-6">
                            <div class="flex items-start gap-4">
                                <div
                                    class="w-12 h-12 bg-pink-100 dark:bg-pink-900 rounded-full flex items-center justify-center flex-shrink-0">
                                    <i class="fas fa-map-marker-alt text-pink-600"></i>
                                </div>
                                <div>
                                    <h3 class="font-bold mb-1">Address</h3>
                                    <p class="text-gray-600 dark:text-gray-400">123 Beauty Street, Cairo, Egypt</p>
                                </div>
                            </div>

                            <div class="flex items-start gap-4">
                                <div
                                    class="w-12 h-12 bg-blue-100 dark:bg-blue-900 rounded-full flex items-center justify-center flex-shrink-0">
                                    <i class="fas fa-phone text-blue-600"></i>
                                </div>
                                <div>
                                    <h3 class="font-bold mb-1">Phone</h3>
                                    <p class="text-gray-600 dark:text-gray-400">+20 123 456 7890</p>
                                </div>
                            </div>

                            <div class="flex items-start gap-4">
                                <div
                                    class="w-12 h-12 bg-purple-100 dark:bg-purple-900 rounded-full flex items-center justify-center flex-shrink-0">
                                    <i class="fas fa-envelope text-purple-600"></i>
                                </div>
                                <div>
                                    <h3 class="font-bold mb-1">Email</h3>
                                    <p class="text-gray-600 dark:text-gray-400">info@glowbeauty.com</p>
                                </div>
                            </div>

                            <div class="flex items-start gap-4">
                                <div
                                    class="w-12 h-12 bg-green-100 dark:bg-green-900 rounded-full flex items-center justify-center flex-shrink-0">
                                    <i class="fas fa-clock text-green-600"></i>
                                </div>
                                <div>
                                    <h3 class="font-bold mb-1">Business Hours</h3>
                                    <p class="text-gray-600 dark:text-gray-400">
                                        Saturday - Thursday: 9:00 AM - 6:00 PM<br>
                                        Friday: Closed
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-lg p-8">
                        <h2 class="text-2xl font-bold mb-6">Follow Us</h2>
                        <div class="flex gap-4">
                            <a href="#"
                                class="w-12 h-12 bg-blue-600 text-white rounded-full flex items-center justify-center hover:bg-blue-700 transition">
                                <i class="fab fa-facebook-f"></i>
                            </a>
                            <a href="#"
                                class="w-12 h-12 bg-pink-600 text-white rounded-full flex items-center justify-center hover:bg-pink-700 transition">
                                <i class="fab fa-instagram"></i>
                            </a>
                            <a href="#"
                                class="w-12 h-12 bg-blue-400 text-white rounded-full flex items-center justify-center hover:bg-blue-500 transition">
                                <i class="fab fa-twitter"></i>
                            </a>
                            <a href="#"
                                class="w-12 h-12 bg-red-600 text-white rounded-full flex items-center justify-center hover:bg-red-700 transition">
                                <i class="fab fa-youtube"></i>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-component"></div>

    <a href="https://wa.me/1234567890" target="_blank"
        class="fixed bottom-6 right-6 bg-green-500 text-white w-16 h-16 rounded-full flex items-center justify-center shadow-lg hover:bg-green-600 transition z-50">
        <i class="fab fa-whatsapp text-3xl"></i>
    </a>

    <script src="./js/core/state.js"></script>
    <script src="./js/core/i18n.js"></script>
    <script src="./js/core/theme.js"></script>
    <script src="./js/core/router.js"></script>
    <script src="./js/services/product.service.js"></script>
    <script src="./js/services/cart.service.js"></script>
    <script src="./js/services/auth.service.js"></script>
    <script src="./js/components/header.component.js"></script>
    <script src="./js/components/footer.component.js"></script>
    <script src="./js/components/product-card.component.js"></script>
    <script src="./js/app.js"></script>
    <script>
        function handleContactForm(event) {
            event.preventDefault();
            showToast('Success', 'Thank you for your message! We will get back to you soon.', 'success');
            event.target.reset();
        }
    </script>
</body>

</html>
