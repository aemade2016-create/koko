<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Glow Beauty</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100">

    <div id="header-component"></div>

    <main class="py-16 px-4 min-h-screen flex items-center">
        <div class="container mx-auto max-w-md">
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl p-8">
                <!-- Tabs -->
                <div class="flex mb-8 border-b dark:border-gray-700">
                    <button onclick="showTab('login')" id="login-tab"
                        class="flex-1 pb-4 font-semibold border-b-2 border-pink-600 text-pink-600">
                        Login
                    </button>
                    <button onclick="showTab('register')" id="register-tab"
                        class="flex-1 pb-4 font-semibold border-b-2 border-transparent text-gray-500">
                        Register
                    </button>
                </div>

                <!-- Login Form -->
                <div id="login-form" class="space-y-6">
                    <h2 class="text-3xl font-bold mb-6">Welcome Back!</h2>

                    <form onsubmit="handleLogin(event)" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium mb-2">Email</label>
                            <input type="email" required
                                class="w-full px-4 py-3 border rounded-lg dark:bg-gray-700 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-pink-500">
                        </div>

                        <div>
                            <label class="block text-sm font-medium mb-2">Password</label>
                            <div class="relative">
                                <input type="password" id="login-password" required
                                    class="w-full px-4 py-3 border rounded-lg dark:bg-gray-700 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-pink-500">
                                <button type="button" onclick="togglePasswordVisibility('login-password')"
                                    class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-700 dark:hover:text-gray-300">
                                    <i class="far fa-eye" id="login-password-icon"></i>
                                </button>
                            </div>
                        </div>

                        <div class="flex items-center justify-between">
                            <label class="flex items-center">
                                <input type="checkbox" class="mr-2">
                                <span class="text-sm">Remember me</span>
                            </label>
                            <a href="#" onclick="showForgotPassword(event)"
                                class="text-sm text-pink-600 hover:underline">Forgot password?</a>
                        </div>

                        <button type="submit"
                            class="w-full bg-pink-600 hover:bg-pink-700 text-white py-3 rounded-lg font-semibold transition">
                            Login
                        </button>
                    </form>

                    <div class="relative my-6">
                        <div class="absolute inset-0 flex items-center">
                            <div class="w-full border-t dark:border-gray-700"></div>
                        </div>
                        <div class="relative flex justify-center text-sm">
                            <span class="px-4 bg-white dark:bg-gray-800 text-gray-500">Or continue with</span>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <button onclick="socialLogin('google')"
                            class="flex items-center justify-center gap-2 border dark:border-gray-600 py-3 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 transition">
                            <i class="fab fa-google text-red-500"></i>
                            <span>Google</span>
                        </button>
                        <button onclick="socialLogin('facebook')"
                            class="flex items-center justify-center gap-2 border dark:border-gray-600 py-3 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 transition">
                            <i class="fab fa-facebook text-blue-600"></i>
                            <span>Facebook</span>
                        </button>
                    </div>

                    <p class="text-xs text-gray-500 text-center mt-4">
                        Demo: admin@glowbeauty.com / admin123
                    </p>
                </div>

                <!-- Register Form -->
                <div id="register-form" class="hidden space-y-6">
                    <h2 class="text-3xl font-bold mb-6">Create Account</h2>

                    <form onsubmit="handleRegister(event)" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium mb-2">Full Name</label>
                            <input type="text" required
                                class="w-full px-4 py-3 border rounded-lg dark:bg-gray-700 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-pink-500">
                        </div>

                        <div>
                            <label class="block text-sm font-medium mb-2">Email</label>
                            <input type="email" required
                                class="w-full px-4 py-3 border rounded-lg dark:bg-gray-700 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-pink-500">
                        </div>

                        <div>
                            <label class="block text-sm font-medium mb-2">Password</label>
                            <div class="relative">
                                <input type="password" id="register-password" required minlength="6"
                                    class="w-full px-4 py-3 border rounded-lg dark:bg-gray-700 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-pink-500">
                                <button type="button" onclick="togglePasswordVisibility('register-password')"
                                    class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-700 dark:hover:text-gray-300">
                                    <i class="far fa-eye" id="register-password-icon"></i>
                                </button>
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-medium mb-2">Confirm Password</label>
                            <div class="relative">
                                <input type="password" id="register-confirm-password" required minlength="6"
                                    class="w-full px-4 py-3 border rounded-lg dark:bg-gray-700 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-pink-500">
                                <button type="button" onclick="togglePasswordVisibility('register-confirm-password')"
                                    class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-700 dark:hover:text-gray-300">
                                    <i class="far fa-eye" id="register-confirm-password-icon"></i>
                                </button>
                            </div>
                        </div>

                        <label class="flex items-start">
                            <input type="checkbox" required class="mr-2 mt-1">
                            <span class="text-sm">I agree to the Terms of Service and Privacy Policy</span>
                        </label>

                        <button type="submit"
                            class="w-full bg-pink-600 hover:bg-pink-700 text-white py-3 rounded-lg font-semibold transition">
                            Create Account
                        </button>
                    </form>

                    <div class="relative my-6">
                        <div class="absolute inset-0 flex items-center">
                            <div class="w-full border-t dark:border-gray-700"></div>
                        </div>
                        <div class="relative flex justify-center text-sm">
                            <span class="px-4 bg-white dark:bg-gray-800 text-gray-500">Or continue with</span>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <button onclick="socialLogin('google')"
                            class="flex items-center justify-center gap-2 border dark:border-gray-600 py-3 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 transition">
                            <i class="fab fa-google text-red-500"></i>
                            <span>Google</span>
                        </button>
                        <button onclick="socialLogin('facebook')"
                            class="flex items-center justify-center gap-2 border dark:border-gray-600 py-3 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 transition">
                            <i class="fab fa-facebook text-blue-600"></i>
                            <span>Facebook</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Forgot Password Modal -->
    <div id="forgot-password-modal"
        class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 px-4">
        <div class="bg-white dark:bg-gray-800 rounded-2xl p-8 max-w-md w-full">
            <h3 class="text-2xl font-bold mb-4">Reset Password</h3>
            <p class="text-gray-600 dark:text-gray-400 mb-6">Enter your email address and we'll send you a reset link.
            </p>

            <form onsubmit="handleForgotPassword(event)" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-2">Email</label>
                    <input type="email" required
                        class="w-full px-4 py-3 border rounded-lg dark:bg-gray-700 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-pink-500">
                </div>

                <div class="flex gap-3">
                    <button type="button" onclick="closeForgotPassword()"
                        class="flex-1 border border-gray-300 dark:border-gray-600 py-3 rounded-lg font-semibold hover:bg-gray-50 dark:hover:bg-gray-700 transition">
                        Cancel
                    </button>
                    <button type="submit"
                        class="flex-1 bg-pink-600 hover:bg-pink-700 text-white py-3 rounded-lg font-semibold transition">
                        Send Reset Link
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div id="footer-component"></div>

    <script src="./js/core/state.js"></script>
    <script src="./js/core/i18n.js"></script>
    <script src="./js/core/theme.js"></script>
    <script src="./js/core/router.js"></script>
    <script src="./js/services/product.service.js"></script>
    <script src="./js/services/cart.service.js"></script>
    <script src="./js/services/auth.service.js"></script>
    <script src="./js/components/header.component.js"></script>
    <script src="./js/components/footer.component.js"></script>
    <script src="./js/components/product-card.component.js"></script>
    <script src="./js/app.js"></script>
    <script src="./js/pages/login.page.js"></script>
</body>

</html>
