<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test All Features - Glow Beauty</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="bg-gray-50 p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-4xl font-bold mb-8 text-center">🧪 Test All Features</h1>

        <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
            <h2 class="text-2xl font-bold mb-4">Quick Tests</h2>

            <div class="space-y-3">
                <button onclick="testProducts()"
                    class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700">
                    Test Products Loading
                </button>

                <button onclick="testLocalStorage()"
                    class="w-full bg-green-600 text-white py-3 rounded-lg font-semibold hover:bg-green-700">
                    Test localStorage
                </button>

                <button onclick="clearAndReload()"
                    class="w-full bg-red-600 text-white py-3 rounded-lg font-semibold hover:bg-red-700">
                    Clear localStorage & Reload
                </button>

                <button onclick="testAuth()"
                    class="w-full bg-purple-600 text-white py-3 rounded-lg font-semibold hover:bg-purple-700">
                    Test Authentication
                </button>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
            <h2 class="text-2xl font-bold mb-4">Page Links</h2>

            <div class="grid grid-cols-2 gap-3">
                <a href="./index.html"
                    class="bg-pink-600 text-white py-3 rounded-lg font-semibold hover:bg-pink-700 text-center">
                    Home
                </a>
                <a href="./shop.html"
                    class="bg-pink-600 text-white py-3 rounded-lg font-semibold hover:bg-pink-700 text-center">
                    Shop
                </a>
                <a href="./cart.html"
                    class="bg-pink-600 text-white py-3 rounded-lg font-semibold hover:bg-pink-700 text-center">
                    Cart
                </a>
                <a href="./wishlist.html"
                    class="bg-pink-600 text-white py-3 rounded-lg font-semibold hover:bg-pink-700 text-center">
                    Wishlist
                </a>
                <a href="./login.html"
                    class="bg-pink-600 text-white py-3 rounded-lg font-semibold hover:bg-pink-700 text-center">
                    Login
                </a>
                <a href="./profile.html"
                    class="bg-pink-600 text-white py-3 rounded-lg font-semibold hover:bg-pink-700 text-center">
                    Profile
                </a>
                <a href="./dashboard.html"
                    class="bg-pink-600 text-white py-3 rounded-lg font-semibold hover:bg-pink-700 text-center">
                    Dashboard
                </a>
                <a href="./admin.html"
                    class="bg-pink-600 text-white py-3 rounded-lg font-semibold hover:bg-pink-700 text-center">
                    Admin
                </a>
            </div>
        </div>

        <div id="results" class="bg-white rounded-lg shadow-lg p-6">
            <h2 class="text-2xl font-bold mb-4">Test Results</h2>
            <div id="results-content" class="space-y-2 text-sm font-mono">
                <p class="text-gray-500">Click a test button to see results...</p>
            </div>
        </div>
    </div>

    <script src="./js/core/state.js"></script>
    <script src="./js/services/product.service.js"></script>
    <script src="./js/services/auth.service.js"></script>

    <script>
        function log(message, type = 'info') {
            const results = document.getElementById('results-content');
            const colors = {
                success: 'text-green-600',
                error: 'text-red-600',
                info: 'text-blue-600',
                warning: 'text-yellow-600'
            };

            const p = document.createElement('p');
            p.className = colors[type];
            p.textContent = message;
            results.appendChild(p);

            console.log(message);
        }

        function clearResults() {
            document.getElementById('results-content').innerHTML = '';
        }

        async function testProducts() {
            clearResults();
            log('🔄 Testing products loading...', 'info');

            try {
                const products = await getAllProducts();

                if (!products || products.length === 0) {
                    log('❌ No products found!', 'error');
                    log('💡 Try clearing localStorage and reloading', 'warning');
                } else {
                    log(`✅ Products loaded successfully: ${products.length} products`, 'success');
                    log(`📦 First product: ${products[0].title.en}`, 'info');
                    log(`💰 Price: ${products[0].price} EGP`, 'info');
                }
            } catch (error) {
                log(`❌ Error: ${error.message}`, 'error');
            }
        }

        function testLocalStorage() {
            clearResults();
            log('🔄 Testing localStorage...', 'info');

            const keys = ['products', 'users', 'app_state'];

            keys.forEach(key => {
                const data = localStorage.getItem(key);
                if (data) {
                    try {
                        const parsed = JSON.parse(data);
                        if (Array.isArray(parsed)) {
                            log(`✅ ${key}: ${parsed.length} items`, 'success');
                        } else {
                            log(`✅ ${key}: exists`, 'success');
                        }
                    } catch (e) {
                        log(`⚠️ ${key}: exists but not JSON`, 'warning');
                    }
                } else {
                    log(`❌ ${key}: not found`, 'error');
                }
            });
        }

        function clearAndReload() {
            if (confirm('This will clear all data and reload the page. Continue?')) {
                localStorage.clear();
                sessionStorage.clear();
                alert('localStorage cleared! Page will reload.');
                location.reload();
            }
        }

        function testAuth() {
            clearResults();
            log('🔄 Testing authentication...', 'info');

            const appState = localStorage.getItem('app_state');
            if (appState) {
                try {
                    const state = JSON.parse(appState);
                    if (state.user && state.user.isAuthenticated) {
                        log(`✅ User is logged in`, 'success');
                        log(`👤 Email: ${state.user.profile.email}`, 'info');
                        log(`🎭 Role: ${state.user.role}`, 'info');
                        log(`⭐ Points: ${state.user.loyaltyPoints || 0}`, 'info');
                    } else {
                        log(`ℹ️ No user logged in`, 'info');
                    }
                } catch (e) {
                    log(`❌ Error parsing app_state: ${e.message}`, 'error');
                }
            } else {
                log(`ℹ️ No app_state found`, 'info');
            }

            const users = localStorage.getItem('users');
            if (users) {
                try {
                    const userList = JSON.parse(users);
                    log(`✅ Total users: ${userList.length}`, 'success');
                    const admins = userList.filter(u => u.role === 'admin');
                    log(`👑 Admin users: ${admins.length}`, 'info');
                    admins.forEach(admin => {
                        log(`  - ${admin.email}`, 'info');
                    });
                } catch (e) {
                    log(`❌ Error parsing users: ${e.message}`, 'error');
                }
            }
        }

        // Auto-run tests on load
        window.addEventListener('load', () => {
            log('🚀 Test page loaded', 'success');
            log('💡 Click buttons above to run tests', 'info');
        });
    </script>
</body>

</html>
