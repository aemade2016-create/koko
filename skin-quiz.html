<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skin Quiz - Glow Beauty</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100">

    <div id="header-component"></div>

    <main class="py-16 px-4">
        <div class="container mx-auto max-w-3xl">
            <!-- Quiz Header -->
            <div class="text-center mb-12">
                <h1 class="text-4xl font-bold mb-4">Find Your Perfect Products</h1>
                <p class="text-gray-600 dark:text-gray-400">Answer 5 quick questions to get personalized product
                    recommendations</p>
            </div>

            <!-- Progress Bar -->
            <div class="mb-8">
                <div class="flex justify-between text-sm mb-2">
                    <span>Question <span id="current-question">1</span> of 5</span>
                    <span id="progress-percent">20%</span>
                </div>
                <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-2">
                    <div id="progress-bar" class="bg-pink-600 h-2 rounded-full transition-all duration-300"
                        style="width: 20%"></div>
                </div>
            </div>

            <!-- Quiz Container -->
            <div id="quiz-container" class="bg-white dark:bg-gray-800 rounded-2xl p-8 shadow-lg">
                <!-- Questions will be rendered here -->
            </div>

            <!-- Results Container -->
            <div id="results-container" class="hidden">
                <div class="bg-white dark:bg-gray-800 rounded-2xl p-8 shadow-lg mb-8">
                    <div class="text-center mb-8">
                        <i class="fas fa-check-circle text-6xl text-green-500 mb-4"></i>
                        <h2 class="text-3xl font-bold mb-2">Your Results Are Ready!</h2>
                        <p class="text-gray-600 dark:text-gray-400">Based on your answers, we recommend these products
                            for you</p>
                    </div>

                    <div id="skin-analysis" class="grid md:grid-cols-3 gap-4 mb-8"></div>
                </div>

                <div class="bg-white dark:bg-gray-800 rounded-2xl p-8 shadow-lg">
                    <h3 class="text-2xl font-bold mb-6">Recommended Products</h3>
                    <div id="recommended-products" class="grid md:grid-cols-3 gap-6"></div>
                </div>

                <div class="text-center mt-8">
                    <button onclick="restartQuiz()"
                        class="border-2 border-pink-600 text-pink-600 px-8 py-3 rounded-lg font-semibold hover:bg-pink-50 dark:hover:bg-gray-700 transition mr-4">
                        Retake Quiz
                    </button>
                    <button onclick="navigateTo('./shop.html')"
                        class="bg-pink-600 hover:bg-pink-700 text-white px-8 py-3 rounded-lg font-semibold transition">
                        Browse All Products
                    </button>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-component"></div>

    <script src="./js/core/state.js"></script>
    <script src="./js/core/i18n.js"></script>
    <script src="./js/core/theme.js"></script>
    <script src="./js/core/router.js"></script>
    <script src="./js/services/product.service.js"></script>
    <script src="./js/services/cart.service.js"></script>
    <script src="./js/services/auth.service.js"></script>
    <script src="./js/components/header.component.js"></script>
    <script src="./js/components/footer.component.js"></script>
    <script src="./js/components/product-card.component.js"></script>
    <script src="./js/app.js"></script>
    <script src="./js/pages/skin-quiz.page.js"></script>
</body>

</html>
