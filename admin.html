<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Glow Beauty</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100">

    <div id="header-component"></div>

    <main class="py-16 px-4">
        <div class="container mx-auto max-w-7xl">
            <div class="flex items-center justify-between mb-8">
                <h1 class="text-4xl font-bold"><i class="fas fa-crown text-yellow-500 mr-3"></i>Admin Panel</h1>
                <a href="./dashboard.html" class="text-pink-600 hover:text-pink-700 font-semibold">
                    <i class="fas fa-arrow-left mr-2"></i>Back to Dashboard
                </a>
            </div>

            <!-- Tabs -->
            <div class="flex gap-4 mb-8 border-b dark:border-gray-700">
                <button onclick="showAdminTab('products')" id="admin-tab-products"
                    class="pb-3 px-4 font-semibold border-b-2 border-pink-600 text-pink-600">
                    Products
                </button>
                <button onclick="showAdminTab('orders')" id="admin-tab-orders"
                    class="pb-3 px-4 font-semibold border-b-2 border-transparent text-gray-500 hover:text-gray-700">
                    Orders
                </button>
            </div>

            <!-- Products Tab -->
            <div id="admin-products" class="space-y-6">
                <div class="bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-lg">
                    <div class="flex items-center justify-between mb-6">
                        <div>
                            <h2 class="text-2xl font-bold">Manage Products</h2>
                            <p class="text-gray-500 dark:text-gray-400 mt-1">
                                <span id="products-count">0</span> products total
                            </p>
                        </div>
                        <button onclick="showAddProductForm()"
                            class="bg-pink-600 hover:bg-pink-700 text-white px-6 py-2 rounded-lg font-semibold transition">
                            <i class="fas fa-plus mr-2"></i>Add Product
                        </button>
                    </div>

                    <div id="products-list" class="space-y-4"></div>
                </div>
            </div>

            <!-- Orders Tab -->
            <div id="admin-orders" class="hidden space-y-6">
                <div class="bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-lg">
                    <h2 class="text-2xl font-bold mb-6">Manage Orders</h2>
                    <div id="orders-list" class="space-y-4"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Add/Edit Product Modal -->
    <div id="product-modal"
        class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 px-4 overflow-y-auto">
        <div class="bg-white dark:bg-gray-800 rounded-2xl p-8 max-w-2xl w-full my-8">
            <h3 class="text-2xl font-bold mb-6" id="modal-title">Add New Product</h3>

            <form id="product-form" class="space-y-4">
                <input type="hidden" id="product-id">

                <div class="grid md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-2">Title (English) *</label>
                        <input type="text" id="title-en" required
                            class="w-full px-4 py-3 border rounded-lg dark:bg-gray-700 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-pink-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Title (Arabic) *</label>
                        <input type="text" id="title-ar" required
                            class="w-full px-4 py-3 border rounded-lg dark:bg-gray-700 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-pink-500">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium mb-2">Brand *</label>
                    <input type="text" id="brand" required
                        class="w-full px-4 py-3 border rounded-lg dark:bg-gray-700 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-pink-500">
                </div>

                <div class="grid md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-2">Price (EGP) *</label>
                        <input type="number" id="price" required min="0" step="0.01"
                            class="w-full px-4 py-3 border rounded-lg dark:bg-gray-700 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-pink-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Old Price (EGP)</label>
                        <input type="number" id="old-price" min="0" step="0.01"
                            class="w-full px-4 py-3 border rounded-lg dark:bg-gray-700 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-pink-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Stock *</label>
                        <input type="number" id="stock" required min="0"
                            class="w-full px-4 py-3 border rounded-lg dark:bg-gray-700 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-pink-500">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium mb-2">Image URL *</label>
                    <input type="url" id="image" required
                        class="w-full px-4 py-3 border rounded-lg dark:bg-gray-700 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-pink-500">
                </div>

                <div>
                    <label class="block text-sm font-medium mb-2">Category *</label>
                    <select id="category" required
                        class="w-full px-4 py-3 border rounded-lg dark:bg-gray-700 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-pink-500">
                        <option value="skincare">Skincare</option>
                        <option value="makeup">Makeup</option>
                        <option value="haircare">Haircare</option>
                        <option value="fragrance">Fragrance</option>
                    </select>
                </div>

                <div class="flex gap-3">
                    <button type="button" onclick="closeProductModal()"
                        class="flex-1 border border-gray-300 dark:border-gray-600 py-3 rounded-lg font-semibold hover:bg-gray-50 dark:hover:bg-gray-700 transition">
                        Cancel
                    </button>
                    <button type="submit"
                        class="flex-1 bg-pink-600 hover:bg-pink-700 text-white py-3 rounded-lg font-semibold transition">
                        Save Product
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div id="footer-component"></div>

    <script src="./js/core/state.js"></script>
    <script src="./js/core/i18n.js"></script>
    <script src="./js/core/theme.js"></script>
    <script src="./js/core/router.js"></script>
    <script src="./js/services/product.service.js"></script>
    <script src="./js/services/cart.service.js"></script>
    <script src="./js/services/auth.service.js"></script>
    <script src="./js/components/header.component.js"></script>
    <script src="./js/components/footer.component.js"></script>
    <script src="./js/components/product-card.component.js"></script>
    <script src="./js/app.js"></script>
    <script src="./js/pages/admin.page.js"></script>
</body>

</html>
