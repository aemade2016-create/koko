<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Glow Beauty</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100">

    <div id="header-component"></div>

    <main class="py-16 px-4">
        <div class="container mx-auto max-w-7xl">
            <h1 class="text-4xl font-bold mb-8">Checkout</h1>

            <div class="grid lg:grid-cols-3 gap-8">
                <!-- Checkout Form -->
                <div class="lg:col-span-2 space-y-6">
                    <!-- Step 1: Shipping Information -->
                    <div id="step-shipping" class="bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-lg">
                        <div class="flex items-center justify-between mb-6">
                            <h2 class="text-2xl font-bold">1. Shipping Information</h2>
                            <span class="text-sm text-gray-500">Step 1 of 3</span>
                        </div>

                        <form id="shipping-form" class="space-y-4">
                            <div class="grid md:grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-sm font-medium mb-2">First Name *</label>
                                    <input type="text" required
                                        class="w-full px-4 py-3 border rounded-lg dark:bg-gray-700 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-pink-500">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium mb-2">Last Name *</label>
                                    <input type="text" required
                                        class="w-full px-4 py-3 border rounded-lg dark:bg-gray-700 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-pink-500">
                                </div>
                            </div>

                            <div>
                                <label class="block text-sm font-medium mb-2">Email *</label>
                                <input type="email" required
                                    class="w-full px-4 py-3 border rounded-lg dark:bg-gray-700 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-pink-500">
                            </div>

                            <div>
                                <label class="block text-sm font-medium mb-2">Phone *</label>
                                <input type="tel" required
                                    class="w-full px-4 py-3 border rounded-lg dark:bg-gray-700 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-pink-500">
                            </div>

                            <div>
                                <label class="block text-sm font-medium mb-2">Address *</label>
                                <input type="text" required
                                    class="w-full px-4 py-3 border rounded-lg dark:bg-gray-700 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-pink-500">
                            </div>

                            <div class="grid md:grid-cols-3 gap-4">
                                <div>
                                    <label class="block text-sm font-medium mb-2">City *</label>
                                    <input type="text" required
                                        class="w-full px-4 py-3 border rounded-lg dark:bg-gray-700 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-pink-500">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium mb-2">State/Province *</label>
                                    <input type="text" required
                                        class="w-full px-4 py-3 border rounded-lg dark:bg-gray-700 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-pink-500">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium mb-2">Postal Code *</label>
                                    <input type="text" required
                                        class="w-full px-4 py-3 border rounded-lg dark:bg-gray-700 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-pink-500">
                                </div>
                            </div>

                            <button type="button" onclick="goToPayment()"
                                class="w-full bg-pink-600 hover:bg-pink-700 text-white py-3 rounded-lg font-semibold transition">
                                Continue to Payment
                            </button>
                        </form>
                    </div>

                    <!-- Step 2: Payment Method -->
                    <div id="step-payment" class="hidden bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-lg">
                        <div class="flex items-center justify-between mb-6">
                            <h2 class="text-2xl font-bold">2. Payment Method</h2>
                            <span class="text-sm text-gray-500">Step 2 of 3</span>
                        </div>

                        <div class="space-y-4">
                            <label
                                class="flex items-center p-4 border-2 rounded-lg cursor-pointer hover:border-pink-500 transition">
                                <input type="radio" name="payment" value="card" checked class="mr-4">
                                <i class="fas fa-credit-card text-2xl text-pink-600 mr-4"></i>
                                <div>
                                    <p class="font-semibold">Credit/Debit Card</p>
                                    <p class="text-sm text-gray-500">Visa, Mastercard</p>
                                </div>
                            </label>

                            <label
                                class="flex items-center p-4 border-2 rounded-lg cursor-pointer hover:border-pink-500 transition">
                                <input type="radio" name="payment" value="vodafone" class="mr-4">
                                <i class="fas fa-mobile-alt text-2xl text-pink-600 mr-4"></i>
                                <div>
                                    <p class="font-semibold">Vodafone Cash</p>
                                    <p class="text-sm text-gray-500">Pay with mobile wallet</p>
                                </div>
                            </label>

                            <label
                                class="flex items-center p-4 border-2 rounded-lg cursor-pointer hover:border-pink-500 transition">
                                <input type="radio" name="payment" value="cod" class="mr-4">
                                <i class="fas fa-money-bill-wave text-2xl text-pink-600 mr-4"></i>
                                <div>
                                    <p class="font-semibold">Cash on Delivery</p>
                                    <p class="text-sm text-gray-500">Pay when you receive</p>
                                </div>
                            </label>
                        </div>

                        <div class="flex gap-3 mt-6">
                            <button type="button" onclick="backToShipping()"
                                class="flex-1 border border-gray-300 dark:border-gray-600 py-3 rounded-lg font-semibold hover:bg-gray-50 dark:hover:bg-gray-700 transition">
                                Back
                            </button>
                            <button type="button" onclick="goToReview()"
                                class="flex-1 bg-pink-600 hover:bg-pink-700 text-white py-3 rounded-lg font-semibold transition">
                                Continue to Review
                            </button>
                        </div>
                    </div>

                    <!-- Step 3: Review Order -->
                    <div id="step-review" class="hidden bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-lg">
                        <div class="flex items-center justify-between mb-6">
                            <h2 class="text-2xl font-bold">3. Review Order</h2>
                            <span class="text-sm text-gray-500">Step 3 of 3</span>
                        </div>

                        <div id="review-items" class="space-y-4 mb-6"></div>

                        <div class="flex gap-3">
                            <button type="button" onclick="backToPayment()"
                                class="flex-1 border border-gray-300 dark:border-gray-600 py-3 rounded-lg font-semibold hover:bg-gray-50 dark:hover:bg-gray-700 transition">
                                Back
                            </button>
                            <button type="button" onclick="placeOrder()"
                                class="flex-1 bg-pink-600 hover:bg-pink-700 text-white py-3 rounded-lg font-semibold transition">
                                Place Order
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Order Summary -->
                <div class="lg:col-span-1">
                    <div class="bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-lg sticky top-4">
                        <h3 class="text-xl font-bold mb-4">Order Summary</h3>

                        <div id="checkout-summary" class="space-y-3 mb-6"></div>

                        <div class="border-t dark:border-gray-700 pt-4 space-y-2">
                            <div class="flex justify-between text-sm">
                                <span>Subtotal</span>
                                <span id="summary-subtotal">0 EGP</span>
                            </div>
                            <div class="flex justify-between text-sm">
                                <span>Shipping</span>
                                <span id="summary-shipping">0 EGP</span>
                            </div>
                            <div class="flex justify-between text-sm">
                                <span>Tax (14%)</span>
                                <span id="summary-tax">0 EGP</span>
                            </div>
                            <div class="flex justify-between text-lg font-bold border-t dark:border-gray-700 pt-2">
                                <span>Total</span>
                                <span id="summary-total">0 EGP</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-component"></div>

    <script src="./js/core/state.js"></script>
    <script src="./js/core/i18n.js"></script>
    <script src="./js/core/theme.js"></script>
    <script src="./js/core/router.js"></script>
    <script src="./js/services/product.service.js"></script>
    <script src="./js/services/cart.service.js"></script>
    <script src="./js/services/auth.service.js"></script>
    <script src="./js/components/header.component.js"></script>
    <script src="./js/components/footer.component.js"></script>
    <script src="./js/components/product-card.component.js"></script>
    <script src="./js/app.js"></script>
    <script src="./js/pages/checkout.page.js"></script>
</body>

</html>
