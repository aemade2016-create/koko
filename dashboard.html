<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Glow Beauty</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100">

    <div id="header-component"></div>

    <main class="py-16 px-4">
        <div class="container mx-auto max-w-7xl">
            <div class="flex items-center justify-between mb-8">
                <h1 class="text-4xl font-bold">My Dashboard</h1>
                <button onclick="logout()" class="text-red-600 hover:text-red-700 font-semibold">
                    <i class="fas fa-sign-out-alt mr-2"></i>Logout
                </button>
            </div>

            <div class="grid lg:grid-cols-4 gap-6 mb-8">
                <!-- Stats Cards -->
                <div class="bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-lg">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-gray-500 text-sm mb-1">Total Orders</p>
                            <p id="stat-orders" class="text-3xl font-bold">0</p>
                        </div>
                        <i class="fas fa-shopping-bag text-4xl text-pink-600"></i>
                    </div>
                </div>

                <div class="bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-lg">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-gray-500 text-sm mb-1">Loyalty Points</p>
                            <p id="stat-points" class="text-3xl font-bold">0</p>
                        </div>
                        <i class="fas fa-star text-4xl text-yellow-500"></i>
                    </div>
                </div>

                <div class="bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-lg">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-gray-500 text-sm mb-1">Wishlist Items</p>
                            <p id="stat-wishlist" class="text-3xl font-bold">0</p>
                        </div>
                        <i class="fas fa-heart text-4xl text-red-600"></i>
                    </div>
                </div>

                <div class="bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-lg">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-gray-500 text-sm mb-1">Total Spent</p>
                            <p id="stat-spent" class="text-3xl font-bold">0</p>
                        </div>
                        <i class="fas fa-dollar-sign text-4xl text-green-600"></i>
                    </div>
                </div>
            </div>

            <!-- Admin Panel Link -->
            <div id="admin-panel-link" class="hidden mb-8">
                <a href="./admin.html"
                    class="block bg-gradient-to-r from-purple-600 to-pink-600 text-white rounded-2xl p-6 shadow-lg hover:shadow-xl transition">
                    <div class="flex items-center justify-between">
                        <div>
                            <h3 class="text-2xl font-bold mb-2">Admin Panel</h3>
                            <p class="text-purple-100">Manage products, orders, and customers</p>
                        </div>
                        <i class="fas fa-crown text-5xl"></i>
                    </div>
                </a>
            </div>

            <!-- Orders Section -->
            <div class="bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-lg mb-8">
                <h2 class="text-2xl font-bold mb-6">My Orders</h2>

                <!-- Order Tabs -->
                <div class="flex gap-4 mb-6 border-b dark:border-gray-700">
                    <button onclick="filterOrders('all')" id="tab-all"
                        class="pb-3 px-4 font-semibold border-b-2 border-pink-600 text-pink-600">
                        All Orders
                    </button>
                    <button onclick="filterOrders('processing')" id="tab-processing"
                        class="pb-3 px-4 font-semibold border-b-2 border-transparent text-gray-500 hover:text-gray-700">
                        Processing
                    </button>
                    <button onclick="filterOrders('completed')" id="tab-completed"
                        class="pb-3 px-4 font-semibold border-b-2 border-transparent text-gray-500 hover:text-gray-700">
                        Completed
                    </button>
                </div>

                <div id="orders-container"></div>
            </div>

            <!-- Wishlist Section -->
            <div class="bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-lg">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-2xl font-bold">My Wishlist</h2>
                    <a href="./wishlist.html" class="text-pink-600 hover:text-pink-700 font-semibold">
                        View All <i class="fas fa-arrow-right ml-2"></i>
                    </a>
                </div>

                <div id="wishlist-preview" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
            </div>
        </div>
    </main>

    <div id="footer-component"></div>

    <script src="./js/core/state.js"></script>
    <script src="./js/core/i18n.js"></script>
    <script src="./js/core/theme.js"></script>
    <script src="./js/core/router.js"></script>
    <script src="./js/services/product.service.js"></script>
    <script src="./js/services/cart.service.js"></script>
    <script src="./js/services/auth.service.js"></script>
    <script src="./js/components/header.component.js"></script>
    <script src="./js/components/footer.component.js"></script>
    <script src="./js/components/product-card.component.js"></script>
    <script src="./js/app.js"></script>
    <script src="./js/pages/dashboard.page.js"></script>
</body>

</html>
